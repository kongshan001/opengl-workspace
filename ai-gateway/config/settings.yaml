upstream_keys:
  - name: "glm-1"
    provider: "glm"
    api_key: "630c7771e7ff400c9fc0b60d96e3c1ae.IukY4FTSKX6JCGmx"
    base_url: "https://open.bigmodel.cn/api/coding/paas/v4"
    max_concurrent: 2
    enabled: true

  - name: "glm-2"
    provider: "glm"
    api_key: "630c7771e7ff400c9fc0b60d96e3c1ae.IukY4FTSKX6JCGmx"
    base_url: "https://open.bigmodel.cn/api/coding/paas/v4"
